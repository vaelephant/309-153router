# ─────────────────────────────────────────────────────────────────────────────
# OptRouter Gateway — 开发环境覆盖（APP_ENV=dev，默认）
# 只需写与 base.toml 不同的值
# ─────────────────────────────────────────────────────────────────────────────

[postgres]
max_connections = 20
min_connections = 3   # 预热 3 条连接，避免冷启动等待
acquire_timeout_secs = 15

[cache]
# 开发时缓存短一点，改了 key 状态能快速生效
key_ttl_secs = 300
